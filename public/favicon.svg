<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Background -->
  <rect width="32" height="32" fill="#1e1e1d"/>
  <!-- Rose border -->
  <rect x="1" y="1" width="30" height="1"  fill="#dc9e95"/>
  <rect x="1" y="30" width="30" height="1" fill="#dc9e95"/>
  <rect x="1" y="1" width="1"  height="30" fill="#dc9e95"/>
  <rect x="30" y="1" width="1" height="30" fill="#dc9e95"/>
  <!-- Pixel "IJ" letters -->
  <!-- I: col 7-9, rows 8-23 -->
  <rect x="7"  y="8"  width="7" height="2" fill="#f3f1e8"/>
  <rect x="9"  y="10" width="3" height="9" fill="#f3f1e8"/>
  <rect x="7"  y="19" width="7" height="2" fill="#f3f1e8"/>
  <!-- J: col 17-22, rows 8-23 -->
  <rect x="17" y="8"  width="7" height="2" fill="#f3f1e8"/>
  <rect x="20" y="10" width="3" height="9" fill="#f3f1e8"/>
  <rect x="17" y="19" width="3" height="2" fill="#f3f1e8"/>
  <rect x="17" y="17" width="2" height="2" fill="#f3f1e8"/>
  <rect x="19" y="19" width="4" height="2" fill="#dc9e95"/>
</svg>
